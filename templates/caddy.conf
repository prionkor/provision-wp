{{DOMAIN}} {

	root * {{SITE_PATH}}

	encode gzip zstd

	php_fastcgi unix//{{PHP_SOCKET}}

	file_server

	try_files {path} {path}/ /index.php?{query}

	# Block sensitive files
	@blocked {
		path */.env
		path */.git/*
		path */wp-config.php
		path */composer.json
		path */composer.lock
	}
	respond @blocked 403

	# Block XML-RPC
	@xmlrpc path /xmlrpc.php
	respond @xmlrpc 403

}